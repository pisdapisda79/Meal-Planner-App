<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Meal Planner App</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --dark: #0f172a;
      --soft: #f1f5f9;
      --danger: #dc2626;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 24px;
    }

    header, .card {
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 1px 8px rgba(15, 23, 42, 0.06);
    }

    header {
      padding: 28px;
      margin-bottom: 24px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 56px);
      line-height: 1;
    }

    h2 { margin: 0 0 16px; }
    p { color: var(--muted); line-height: 1.5; }

    .eyebrow {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      gap: 12px;
      text-align: center;
    }

    .stat {
      background: var(--soft);
      border-radius: 18px;
      padding: 16px;
    }

    .stat strong {
      display: block;
      font-size: 26px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .layout {
      display: grid;
      grid-template-columns: 0.9fr 1.3fr;
      gap: 24px;
    }

    .stack { display: grid; gap: 24px; }
    .card { padding: 24px; }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 13px 14px;
      font-size: 15px;
      outline: none;
      background: white;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #94a3b8;
      box-shadow: 0 0 0 3px #e2e8f0;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-stack { display: grid; gap: 12px; }

    button {
      border: 0;
      border-radius: 16px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
    }

    .btn-primary {
      background: var(--dark);
      color: white;
    }

    .btn-secondary {
      background: white;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-danger {
      background: #fee2e2;
      color: var(--danger);
    }

    .recipe {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      background: white;
    }

    .recipe.selected {
      border-color: var(--dark);
      background: var(--soft);
    }

    .recipe-main {
      cursor: pointer;
      flex: 1;
    }

    .recipe-title {
      font-weight: 800;
      margin-bottom: 5px;
    }

    .recipe-meta {
      color: var(--muted);
      font-size: 13px;
    }

    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 8px;
      min-width: 760px;
    }

    th {
      color: var(--muted);
      text-align: left;
      font-size: 13px;
      padding: 6px;
    }

    td {
      padding: 6px;
      vertical-align: top;
    }

    .shopping-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .shop-item {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      background: white;
      cursor: pointer;
    }

    .shop-item.checked {
      background: var(--soft);
      color: #94a3b8;
      text-decoration: line-through;
    }

    .small {
      color: var(--muted);
      font-size: 12px;
      margin-top: 5px;
      text-decoration: none;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .empty {
      padding: 28px;
      background: var(--soft);
      border-radius: 18px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      header, .layout { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(3, 1fr); }
      .shopping-grid { grid-template-columns: 1fr; }
    }

    @media print {
      body { background: white; }
      header, .left, .schedule-card, .no-print { display: none !important; }
      .container { padding: 0; }
      .layout { display: block; }
      .card { box-shadow: none; border-radius: 0; padding: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <div class="eyebrow">🍽️ Recipe to Grocery Planner</div>
        <h1>Weekly Meal Planner</h1>
        <p>Add recipes, plan your week, and generate a shopping list. Your information saves automatically in this browser.</p>
        <button class="btn-secondary" onclick="resetEverything()">Reset Saved App Data</button>
      </div>
      <div class="stats">
        <div class="stat"><strong id="recipeCount">0</strong><span>Recipes</span></div>
        <div class="stat"><strong id="selectedCount">0</strong><span>Selected</span></div>
        <div class="stat"><strong id="itemCount">0</strong><span>Items</span></div>
      </div>
    </header>

    <main class="layout">
      <section class="stack left">
        <div class="card">
          <h2>➕ Add a Recipe</h2>
          <div class="form-stack">
            <input id="recipeName" placeholder="Recipe name, e.g. Lemon Chicken" />
            <div class="form-grid">
              <select id="recipeCategory">
                <option>Breakfast</option>
                <option>Lunch</option>
                <option selected>Dinner</option>
              </select>
              <input id="recipeServings" type="number" min="1" value="4" placeholder="Servings" />
            </div>
            <textarea id="ingredientsText" placeholder="Ingredients format: name, quantity, unit&#10;Example:&#10;Chicken breast, 2, lb&#10;Rice, 2, cups&#10;Broccoli, 3, cups"></textarea>
            <button class="btn-primary" onclick="addRecipe()">Add Recipe</button>
          </div>
        </div>

        <div class="card">
          <h2>Recipe Library</h2>
          <div id="recipeLibrary" class="stack"></div>
        </div>
      </section>

      <section class="stack">
        <div class="card schedule-card">
          <div class="actions">
            <h2>📅 Weekly Schedule</h2>
            <button class="btn-secondary" onclick="clearPlan()">Clear Schedule</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>Day</th><th>Breakfast</th><th>Lunch</th><th>Dinner</th></tr>
              </thead>
              <tbody id="scheduleBody"></tbody>
            </table>
          </div>
        </div>

        <div class="card">
          <div class="actions no-print">
            <h2>🛒 Shopping List</h2>
            <button class="btn-primary" onclick="window.print()">Print / Save as PDF</button>
          </div>
          <div id="shoppingList"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
    const MEAL_TYPES = ["Breakfast", "Lunch", "Dinner"];

    const starterRecipes = [
      {
        id: "recipe-1",
        name: "Chicken Rice Bowl",
        category: "Dinner",
        servings: 4,
        ingredients: [
          { name: "Chicken breast", qty: 2, unit: "lb" },
          { name: "Rice", qty: 2, unit: "cups" },
          { name: "Broccoli", qty: 3, unit: "cups" },
          { name: "Soy sauce", qty: 4, unit: "tbsp" }
        ]
      },
      {
        id: "recipe-2",
        name: "Egg & Potato Breakfast",
        category: "Breakfast",
        servings: 2,
        ingredients: [
          { name: "Eggs", qty: 4, unit: "pcs" },
          { name: "Potatoes", qty: 3, unit: "pcs" },
          { name: "Bell pepper", qty: 1, unit: "pcs" }
        ]
      },
      {
        id: "recipe-3",
        name: "Turkey Pasta",
        category: "Dinner",
        servings: 4,
        ingredients: [
          { name: "Ground turkey", qty: 1, unit: "lb" },
          { name: "Pasta", qty: 450, unit: "g" },
          { name: "Tomato sauce", qty: 2, unit: "cups" },
          { name: "Zucchini", qty: 2, unit: "pcs" }
        ]
      }
    ];

    let recipes = JSON.parse(localStorage.getItem("mealPlannerRecipesWeb") || "null") || starterRecipes;
    let selectedRecipeIds = JSON.parse(localStorage.getItem("mealPlannerSelectedWeb") || "[]");
    let plan = JSON.parse(localStorage.getItem("mealPlannerPlanWeb") || "{}");
    let checkedItems = JSON.parse(localStorage.getItem("mealPlannerCheckedWeb") || "{}");

    function save() {
      localStorage.setItem("mealPlannerRecipesWeb", JSON.stringify(recipes));
      localStorage.setItem("mealPlannerSelectedWeb", JSON.stringify(selectedRecipeIds));
      localStorage.setItem("mealPlannerPlanWeb", JSON.stringify(plan));
      localStorage.setItem("mealPlannerCheckedWeb", JSON.stringify(checkedItems));
    }

    function makeId() {
      return `recipe-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function normalize(text) {
      return text.trim().toLowerCase().replace(/\s+/g, " ");
    }

    function titleCase(text) {
      return text.replace(/\w\S*/g, word => word.charAt(0).toUpperCase() + word.slice(1));
    }

    function parseIngredients(text) {
      return text.split("\n")
        .map(line => line.trim())
        .filter(Boolean)
        .map(line => {
          const parts = line.split(",").map(part => part.trim());
          return {
            name: parts[0] || "Ingredient",
            qty: Number(parts[1]) || 1,
            unit: parts[2] || ""
          };
        });
    }

    function addRecipe() {
      const name = document.getElementById("recipeName").value.trim();
      const category = document.getElementById("recipeCategory").value;
      const servings = Number(document.getElementById("recipeServings").value) || 1;
      const ingredientsText = document.getElementById("ingredientsText").value;

      if (!name) {
        alert("Please enter a recipe name.");
        return;
      }

      recipes.unshift({
        id: makeId(),
        name,
        category,
        servings,
        ingredients: parseIngredients(ingredientsText)
      });

      selectedRecipeIds.push(recipes[0].id);
      document.getElementById("recipeName").value = "";
      document.getElementById("recipeCategory").value = "Dinner";
      document.getElementById("recipeServings").value = "4";
      document.getElementById("ingredientsText").value = "";
      save();
      render();
    }

    function toggleRecipe(id) {
      selectedRecipeIds = selectedRecipeIds.includes(id)
        ? selectedRecipeIds.filter(recipeId => recipeId !== id)
        : [...selectedRecipeIds, id];
      save();
      render();
    }

    function deleteRecipe(id) {
      if (!confirm("Delete this recipe?")) return;
      recipes = recipes.filter(recipe => recipe.id !== id);
      selectedRecipeIds = selectedRecipeIds.filter(recipeId => recipeId !== id);
      Object.keys(plan).forEach(key => {
        if (plan[key] === id) plan[key] = "";
      });
      save();
      render();
    }

    function updateMeal(day, mealType, recipeId) {
      plan[`${day}-${mealType}`] = recipeId;
      save();
      renderShoppingList();
      renderStats();
    }

    function clearPlan() {
      plan = {};
      checkedItems = {};
      save();
      render();
    }

    function resetEverything() {
      if (!confirm("This will delete your saved recipes and weekly plan. Are you sure?")) return;
      recipes = starterRecipes;
      selectedRecipeIds = [];
      plan = {};
      checkedItems = {};
      save();
      render();
    }

    function getSelectedRecipes() {
      return recipes.filter(recipe => selectedRecipeIds.includes(recipe.id));
    }

    function getShoppingList() {
      const grouped = new Map();
      Object.values(plan).filter(Boolean).forEach(recipeId => {
        const recipe = recipes.find(item => item.id === recipeId);
        if (!recipe) return;
        recipe.ingredients.forEach(ingredient => {
          const key = `${normalize(ingredient.name)}|${ingredient.unit.trim().toLowerCase()}`;
          const existing = grouped.get(key);
          if (existing) {
            existing.qty += Number(ingredient.qty) || 0;
            existing.usedIn.push(recipe.name);
          } else {
            grouped.set(key, {
              key,
              name: titleCase(normalize(ingredient.name)),
              qty: Number(ingredient.qty) || 0,
              unit: ingredient.unit.trim(),
              usedIn: [recipe.name]
            });
          }
        });
      });
      return Array.from(grouped.values()).sort((a, b) => a.name.localeCompare(b.name));
    }

    function renderStats() {
      document.getElementById("recipeCount").textContent = recipes.length;
      document.getElementById("selectedCount").textContent = selectedRecipeIds.length;
      document.getElementById("itemCount").textContent = getShoppingList().length;
    }

    function renderRecipes() {
      const library = document.getElementById("recipeLibrary");
      library.innerHTML = recipes.map(recipe => {
        const selected = selectedRecipeIds.includes(recipe.id);
        return `
          <div class="recipe ${selected ? "selected" : ""}">
            <div class="recipe-main" onclick="toggleRecipe('${recipe.id}')">
              <div class="recipe-title">${selected ? "✅" : "⚪"} ${recipe.name}</div>
              <div class="recipe-meta">${recipe.category} · ${recipe.servings} servings · ${recipe.ingredients.length} ingredients</div>
            </div>
            <button class="btn-danger" onclick="deleteRecipe('${recipe.id}')">Delete</button>
          </div>
        `;
      }).join("");
    }

    function renderSchedule() {
      const selectedRecipes = getSelectedRecipes();
      const body = document.getElementById("scheduleBody");
      body.innerHTML = DAYS.map(day => `
        <tr>
          <td><strong>${day}</strong></td>
          ${MEAL_TYPES.map(mealType => {
            const key = `${day}-${mealType}`;
            return `
              <td>
                <select onchange="updateMeal('${day}', '${mealType}', this.value)">
                  <option value="">Select recipe</option>
                  ${selectedRecipes.map(recipe => `
                    <option value="${recipe.id}" ${plan[key] === recipe.id ? "selected" : ""}>${recipe.name}</option>
                  `).join("")}
                </select>
              </td>
            `;
          }).join("")}
        </tr>
      `).join("");
    }

    function toggleChecked(key) {
      checkedItems[key] = !checkedItems[key];
      save();
      renderShoppingList();
    }

    function renderShoppingList() {
      const list = getShoppingList();
      const wrapper = document.getElementById("shoppingList");

      if (!list.length) {
        wrapper.innerHTML = `<div class="empty">Add recipes to your weekly schedule to generate a shopping list.</div>`;
        return;
      }

      wrapper.innerHTML = `
        <div class="shopping-grid">
          ${list.map(item => `
            <div class="shop-item ${checkedItems[item.key] ? "checked" : ""}" onclick="toggleChecked('${item.key}')">
              <strong>${checkedItems[item.key] ? "☑" : "☐"} ${item.qty} ${item.unit} ${item.name}</strong>
              <div class="small">Used in: ${[...new Set(item.usedIn)].join(", ")}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function render() {
      renderStats();
      renderRecipes();
      renderSchedule();
      renderShoppingList();
    }

    render();
  </script>
</body>
</html>
